name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docs.yml"
      - "Doxyfile"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "scripts/docs/**"
      - "src/rtr/**"
      - "uv.lock"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/docs.yml"
      - "Doxyfile"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "scripts/docs/**"
      - "src/rtr/**"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install docs system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Sync Python dependencies
        run: uv sync --python 3.11

      - name: Validate generated docs navigation
        run: uv run python scripts/docs/generate_source_tree_nav.py --check

      - name: Generate API reference
        run: doxygen Doxyfile

      - name: Build MkDocs site
        run: uv run mkdocs build --strict

      - name: Add .nojekyll marker
        run: touch site/.nojekyll

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
